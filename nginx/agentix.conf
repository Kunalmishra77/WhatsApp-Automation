server {
    listen 80;
    server_name 76.13.250.173 _;

    # Max upload size for KB document uploads (10MB)
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "origin-when-cross-origin" always;

    # Proxy all requests to Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts (KB uploads + large campaigns can take time)
        proxy_connect_timeout  120s;
        proxy_send_timeout     120s;
        proxy_read_timeout     120s;

        proxy_buffering        off;
    }

    # Static assets cache (Next.js /_next/static/)
    location /_next/static/ {
        proxy_pass       http://127.0.0.1:3000/_next/static/;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Webhook endpoint — no buffering, immediate delivery
    location /api/webhooks/ {
        proxy_pass        http://127.0.0.1:3000/api/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_buffering    off;
    }

    # Health check endpoint (for monitoring)
    location /health {
        access_log off;
        proxy_pass http://127.0.0.1:3000/api/workspace/status;
    }

    access_log /var/log/nginx/agentix_access.log;
    error_log  /var/log/nginx/agentix_error.log;
}
